name: CI -- Mathdoc Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node.js dependencies (reproducible)
        run: npm ci

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libcairo2 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          source .venv/bin/activate
          python -m pytest -v -ra

      - name: Check whitespace errors
        run: git diff --check

      - name: Check for tracked .pyc files
        run: git ls-files | grep -E '\.pyc$' || echo "No tracked .pyc files"

      - name: Check for bidi control characters in workflow
        run: |
          if grep -Pn '[\x{200E}\x{200F}\x{202A}\x{202B}\x{202C}\x{202D}\x{202E}\x{2066}\x{2067}\x{2068}\x{2069}]' .github/workflows/ci.yml; then
            echo "ERROR: Bidi control characters found in workflow file"
            exit 1
          else
            echo "No bidi control characters detected"
          fi
